<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Image | MediSight AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="result-page">
  <nav class="navbar navbar-expand-lg sticky-top result-nav">
    <div class="container">
      <a class="navbar-brand" href="index.html">MediSight AI</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-lg-2">
          <li class="nav-item"><a class="nav-link" data-page="index.html" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" data-page="upload.html" href="upload.html">Start Analysis</a></li>
          <li class="nav-item"><a class="nav-link" data-page="history.html" href="history.html">History</a></li>
          <li class="nav-item"><a class="nav-link" data-page="contact.html" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container page-header">
    <div class="progress-steps mb-3">
      <span class="progress-chip active">1. Upload</span>
      <span class="progress-chip">2. Vitals</span>
      <span class="progress-chip">3. Symptoms</span>
      <span class="progress-chip">4. Result</span>
    </div>
    <h2 class="section-title">Medical Image Upload</h2>
  </div>

  <div class="container pb-4">
    <div class="panel-card p-4">
      <div class="mb-3">
        <label class="form-label" for="imageType">Image Type</label>
        <select class="form-select" id="imageType">
          <option>Chest X-ray</option>
          <option>Skin Disease Image</option>
          <option>Other</option>
        </select>
      </div>

      <input class="d-none" type="file" id="imageFile" accept="image/png, image/jpeg, image/jpg, image/webp" />
      <div class="upload-zone mb-3" id="uploadZone">
        <h5 class="mb-1">Drag and drop image here</h5>
        <p class="text-secondary mb-0">or click to browse files</p>
      </div>

      <p class="small text-secondary">Accepted types: .png, .jpg, .jpeg, .webp</p>
      <div class="preview-box" id="previewBox">Image preview area</div>
      <p id="qualityMsg" class="mt-3 text-secondary">Image quality message placeholder.</p>

      <div class="d-flex justify-content-end mt-4">
        <button id="uploadNextBtn" class="btn btn-medical" type="button">Next: Enter Vitals</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
