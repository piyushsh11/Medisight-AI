<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Vitals | MediSight AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="result-page">
  <nav class="navbar navbar-expand-lg sticky-top result-nav">
    <div class="container">
      <a class="navbar-brand" href="index.html">MediSight AI</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-lg-2">
          <li class="nav-item"><a class="nav-link" data-page="index.html" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" data-page="upload.html" href="upload.html">Start Analysis</a></li>
          <li class="nav-item"><a class="nav-link" data-page="history.html" href="history.html">History</a></li>
          <li class="nav-item"><a class="nav-link" data-page="contact.html" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container page-header">
    <div class="progress-steps mb-3">
      <span class="progress-chip">1. Upload</span>
      <span class="progress-chip active">2. Vitals</span>
      <span class="progress-chip">3. Symptoms</span>
      <span class="progress-chip">4. Result</span>
    </div>
    <h2 class="section-title">Patient Vitals</h2>
  </div>

  <div class="container pb-4">
    <form class="panel-card p-4 needs-validation" id="vitalsForm" novalidate>
      <div class="row g-3">
        <div class="col-md-4"><label class="form-label">Age</label><input id="age" required type="number" class="form-control" min="0" max="120" /></div>
        <div class="col-md-4"><label class="form-label">Sex</label><select id="sex" required class="form-select"><option value="">Select</option><option>Male</option><option>Female</option><option>Other</option></select></div>
        <div class="col-md-4"><label class="form-label">SBP (mmHg)</label><input id="sbp" required type="number" class="form-control" min="60" max="250" /></div>
        <div class="col-md-4"><label class="form-label">DBP (mmHg)</label><input id="dbp" required type="number" class="form-control" min="40" max="150" /></div>
        <div class="col-md-4"><label class="form-label">Heart Rate (bpm)</label><input id="heartRate" required type="number" class="form-control" min="20" max="220" /></div>
        <div class="col-md-4"><label class="form-label">Temperature (°F)</label><input id="temperature" required type="number" step="0.1" class="form-control" min="90" max="110" /></div>
        <div class="col-md-4"><label class="form-label">Respiratory Rate (/min)</label><input id="respiratoryRate" required type="number" class="form-control" min="8" max="60" /></div>
        <div class="col-md-4"><label class="form-label">SpO2 (%)</label><input id="spo2" required type="number" class="form-control" min="50" max="100" /></div>
        <div class="col-md-4"><label class="form-label">Weight (kg)</label><input id="weight" required type="number" step="0.1" class="form-control" min="1" max="300" /></div>
        <div class="col-md-4"><label class="form-label">Glucose (optional, mg/dL)</label><input id="glucose" type="number" class="form-control" min="20" max="600" /></div>
      </div>
      <div class="d-flex justify-content-between mt-4">
        <a class="btn btn-outline-medical" href="upload.html">Back</a>
        <button type="submit" class="btn btn-medical">Next: Symptoms</button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
