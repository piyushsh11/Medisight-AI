<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Symptoms Input | MediSight AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="result-page">
  <nav class="navbar navbar-expand-lg sticky-top result-nav">
    <div class="container">
      <a class="navbar-brand" href="index.html">MediSight AI</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-lg-2">
          <li class="nav-item"><a class="nav-link" data-page="index.html" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" data-page="upload.html" href="upload.html">Start Analysis</a></li>
          <li class="nav-item"><a class="nav-link" data-page="history.html" href="history.html">History</a></li>
          <li class="nav-item"><a class="nav-link" data-page="contact.html" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container page-header">
    <div class="progress-steps mb-3">
      <span class="progress-chip">1. Upload</span>
      <span class="progress-chip">2. Vitals</span>
      <span class="progress-chip active">3. Symptoms</span>
      <span class="progress-chip">4. Result</span>
    </div>
    <h2 class="section-title">Symptoms Description</h2>
  </div>

  <div class="container pb-4">
    <form class="panel-card p-4" id="symptomsForm">
      <div class="mb-3">
        <label class="form-label" for="symptomsText">Describe Symptoms</label>
        <textarea id="symptomsText" class="form-control" rows="7" placeholder="Fever for 3 days, cough, breathlessness" required></textarea>
        <div class="invalid-feedback">Please enter symptom details before analysis.</div>
      </div>

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label" for="duration">Duration (optional)</label>
          <input id="duration" type="text" class="form-control" placeholder="e.g. 3 days" />
        </div>
        <div class="col-md-6">
          <label class="form-label" for="severity">Severity (optional)</label>
          <select id="severity" class="form-select">
            <option value="">Select</option>
            <option>Mild</option>
            <option>Moderate</option>
            <option>Severe</option>
          </select>
        </div>
      </div>

      <div class="d-flex justify-content-between mt-4">
        <a class="btn btn-outline-medical" href="vitals.html">Back</a>
        <button class="btn btn-medical" type="submit">Analyze Case</button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
